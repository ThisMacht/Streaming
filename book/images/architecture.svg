<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #475569; stroke-width: 2; rx: 8; }
      .topic { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .sink { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .text { font: 20px sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 17px sans-serif; fill: #0f172a; text-anchor: middle; }
      .line { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="box" x="25" y="255" width="230" height="90"/>
  <text class="text" x="140" y="290"><tspan x="140">Python repository</tspan><tspan x="140" dy="28">huggingface/accelerate</tspan></text>
  <rect class="box" x="310" y="255" width="190" height="90"/>
  <text class="text" x="405" y="307">Parser Service</text>

  <rect class="topic" x="565" y="40" width="230" height="65"/>
  <text class="small" x="680" y="80">Kafka: cpg.nodes.v1</text>
  <rect class="topic" x="565" y="155" width="230" height="65"/>
  <text class="small" x="680" y="195">Kafka: cpg.edges.v1</text>
