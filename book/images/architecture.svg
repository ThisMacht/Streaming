  <path class="line" d="M795 332 H850"/>
  <path class="line" d="M1135 332 H1200"/>
  <path class="line" d="M795 507 H875"/>

  <path d="M405 345 C405 575 1030 590 1287 367" class="line" stroke-dasharray="8 6"/>
