  <text class="small" x="680" y="515">Kafka: cpg.errors.v1</text>

  <rect class="sink" x="875" y="85" width="235" height="90"/>
  <text class="text" x="992" y="122"><tspan x="992">Neo4j Kafka</tspan><tspan x="992" dy="28">Sink Connector</tspan></text>
  <rect class="sink" x="850" y="270" width="285" height="125"/>
  <text class="text" x="992" y="307"><tspan x="992">Spark Structured Streaming</tspan><tspan x="992" dy="28">+ MongoDB Spark</tspan><tspan x="992" dy="28">Connector</tspan></text>
  <rect class="box" x="875" y="465" width="235" height="75"/>
  <text class="text" x="992" y="512">Error logs</text>

  <rect class="box" x="1200" y="95" width="175" height="70"/>
  <text class="text" x="1287" y="138">Neo4j</text>
  <rect class="box" x="1200" y="297" width="175" height="70"/>
  <text class="small" x="1287" y="327"><tspan x="1287">MongoDB</tspan><tspan x="1287" dy="23">source_metadata</tspan></text>

  <path class="line" d="M255 300 H310"/>
  <path class="line" d="M500 285 C525 210 530 72 565 72"/>
  <path class="line" d="M500 290 C530 245 535 187 565 187"/>
  <path class="line" d="M500 310 C530 325 535 332 565 332"/>
  <path class="line" d="M500 325 C530 405 535 507 565 507"/>
